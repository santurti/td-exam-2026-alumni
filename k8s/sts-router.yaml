apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-router
spec:
  serviceName: svc-router
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
        - name: router
          image: gcr.io/repaso-examen-500009/router
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi